# Docker Swarm stack — deployed by GitHub Actions (deploy/cicd.yml).
# Env vars are injected by the workflow from GitHub secrets.
services:
  app:
    image: ${IMAGE}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      PORT: "80"
      # Only the prod env runs the nightly churner cron (saves Ollama/DeepSeek load)
      VDS_ENV: ${VDS_ENV:-prod}
      RECEIPTS_LOCAL_PATH: "${RECEIPTS_LOCAL_PATH:-/receipts}"
    ports:
      - "${PORT:-8766}:80"   # 8766 = prod, 8767 = staging — gesetzt von cicd.yml
    # Belege werden unter /receipts persistiert. Default: named volume
    # (Docker verwaltet → keine Pfad-Annahmen, Deploy klappt immer).
    # Override für Bind-Mount auf einen bestehenden Host-Ordner:
    #   docker stack deploy ... # mit RECEIPTS_VOLUME=/mnt/user/Aufnahmen/receipts
    # Single-Machine-User (Unraid Template / docker-compose) setzen
    # RECEIPTS_VOLUME einfach auf ihren bevorzugten Pfad — die App serviert
    # die Bilder dann direkt unter /receipts/* (kein NPM nötig).
    volumes:
      - "${RECEIPTS_VOLUME:-vds-receipts}:/receipts"
    healthcheck:
      # Node statt wget — garantiert im Image vorhanden, deutlich robuster
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:80/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 45s
    deploy:
      replicas: 2
      update_config:
        order: start-first       # neue Instanz hochfahren BEVOR alte stoppt → zero downtime
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
      rollback_config:
        order: start-first
      restart_policy:
        condition: any
        delay: 5s

volumes:
  vds-receipts:
