name: CI/CD

on:
  push:
    branches: [main, stage, dev]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.x.outputs.tag }}
      env: ${{ steps.x.outputs.env }}
      port: ${{ steps.x.outputs.port }}
      stack: ${{ steps.x.outputs.stack }}
      db_secret: ${{ steps.x.outputs.db_secret }}
    steps:
      - id: x
        run: |
          case "${{ github.ref_name }}" in
            main)
              echo "tag=latest"        >> $GITHUB_OUTPUT
              echo "env=production"    >> $GITHUB_OUTPUT
              echo "port=8766"         >> $GITHUB_OUTPUT
              echo "stack=vds"         >> $GITHUB_OUTPUT
              echo "db_secret=DATABASE_URL" >> $GITHUB_OUTPUT
              ;;
            stage)
              echo "tag=stage"               >> $GITHUB_OUTPUT
              echo "env=staging"             >> $GITHUB_OUTPUT
              echo "port=8767"               >> $GITHUB_OUTPUT
              echo "stack=vds-stage"         >> $GITHUB_OUTPUT
              echo "db_secret=DATABASE_URL_STAGING" >> $GITHUB_OUTPUT
              ;;
            dev)
              echo "tag=dev"             >> $GITHUB_OUTPUT
              echo "env=development"     >> $GITHUB_OUTPUT
              echo "port=8768"           >> $GITHUB_OUTPUT
              echo "stack=vds-dev"       >> $GITHUB_OUTPUT
              echo "db_secret=DATABASE_URL_DEV" >> $GITHUB_OUTPUT
              ;;
          esac

  build:
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.meta.outputs.tag }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_REF=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [meta, build]
    runs-on: [self-hosted, swarm]
    environment: ${{ needs.meta.outputs.env }}
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Deploy stack (rolling update)
        env:
          IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}
          DATABASE_URL: ${{ secrets[needs.meta.outputs.db_secret] }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
          PORT: ${{ needs.meta.outputs.port }}
          STACK: ${{ needs.meta.outputs.stack }}
        run: docker stack deploy --with-registry-auth --detach=false -c deploy/stack.yml "$STACK"
      - name: Verify
        env:
          STACK: ${{ needs.meta.outputs.stack }}
        run: |
          sleep 5
          docker service ls --filter name="${STACK}"
          docker service ps "${STACK}_app" --no-trunc | head -5
